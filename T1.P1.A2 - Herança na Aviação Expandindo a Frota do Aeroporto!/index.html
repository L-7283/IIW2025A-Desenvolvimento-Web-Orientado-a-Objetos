<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aeroporto Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="painel">
        <h1>Controle de Voo</h1>
        
        <div class="info">
            <p><strong>Voo:</strong> <span id="cod">---</span></p>
            <p><strong>Origem:</strong> São Paulo</p>
            <p><strong>Destino:</strong> Rio de Janeiro </p>
            <p><strong>Status:</strong> <span id="stat">---</span></p>
            <p><strong>Altitude:</strong> <span id="alt">0</span> ft</p>
        </div>

        <div class="pista">
            <img src="IMG/viao.png" id="aviao">
        </div>

        <div class="botoes">
            <button onclick="meuVoo.decolar()">Decolar</button>
            <button onclick="meuVoo.ganharAltitude()">Subir +</button>
            <button onclick="meuVoo.pousar()">Pousar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
